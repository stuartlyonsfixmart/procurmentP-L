<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procurement Trends — Fixmart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;font-size:13px}
header{background:#1B365D;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:700}
header nav a{color:#aec6e8;text-decoration:none;margin-left:20px;font-size:13px}
header nav a:hover,header nav a.active{color:#fff}
.container{padding:24px}
.chart-card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:20px;margin-bottom:20px}
.chart-title{font-size:13px;font-weight:700;color:#1B365D;margin-bottom:16px}
.chart-wrap{position:relative;height:280px}
.small-multiples{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.sm-card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:16px}
.sm-title{font-size:12px;font-weight:600;color:#1B365D;margin-bottom:10px}
.sm-wrap{position:relative;height:140px}
.loading{text-align:center;padding:40px;color:#888}
</style>
</head>
<body>
<header>
  <h1>Fixmart — Procurement Trends</h1>
  <nav>
    <a href="/">P&amp;L</a>
    <a href="/trends" class="active">Trends</a>
    <a href="/logout">Sign out</a>
  </nav>
</header>
<div class="container">
  <div id="loading" class="loading">Loading trend data…</div>
  <div id="content" style="display:none">
    <div class="chart-card">
      <div class="chart-title">Total Procurement Cost by Month (Jan 2025 onwards)</div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="chart-title" style="margin-bottom:12px;font-size:13px;font-weight:700;color:#1B365D">Cost by Group</div>
    <div class="small-multiples" id="smallMultiples"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const GROUPS = ['Stock Purchases','Import Costs','Discounts & Rebates','3PL & Container Handling','Procurement People','Procurement Travel'];
const CREDIT_GROUPS = new Set(['Discounts & Rebates']);
const NAVY = '#1B365D';
const GREY = '#94a3b8';
function fmtMonth(d){ const dt=new Date(d+'T00:00:00Z'); return dt.toLocaleString('en-GB',{month:'short',year:'2-digit',timeZone:'UTC'}); }
function fmtK(n){ return n>=1000?'\u00a3'+(n/1000).toFixed(0)+'k':'\u00a3'+n.toFixed(0); }
async function load(){
  try{
    const res = await fetch('/api/trend').then(r=>r.json());
    if(!res.success){ if(res.error==='session_expired') location.href='/login.html'; return; }
    const data = res.data;
    const periods = [...new Set(data.map(r=>r.period_date.substring(0,7)))].sort();
    const labels = periods.map(p=>fmtMonth(p+'-01'));
    const totals = periods.map(p=>{
      let t=0;
      GROUPS.forEach(g=>{
        data.filter(r=>r.period_date.substring(0,7)===p && r.section===g)
            .forEach(r=>{ t += CREDIT_GROUPS.has(g) ? -r.total : r.total; });
      });
      return Math.round(t);
    });
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    new Chart(document.getElementById('mainChart'),{
      type:'bar',
      data:{labels,datasets:[{label:'Total Cost',data:totals,backgroundColor:periods.map((_,i)=>i>=periods.length-8?NAVY:GREY),borderRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'\u00a3'+c.raw.toLocaleString('en-GB')}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#f0f2f5'},ticks:{callback:v=>fmtK(v),font:{size:10}},border:{display:false}}}}
    });
    const sm = document.getElementById('smallMultiples');
    GROUPS.forEach(group=>{
      const vals = periods.map(p=>{
        let t=0;
        data.filter(r=>r.period_date.substring(0,7)===p && r.section===group)
            .forEach(r=>{ t+=CREDIT_GROUPS.has(group)?-r.total:r.total; });
        return Math.round(t);
      });
      const div=document.createElement('div'); div.className='sm-card';
      const wrap=document.createElement('div'); wrap.className='sm-wrap';
      const canvas=document.createElement('canvas');
      div.innerHTML='<div class="sm-title">'+group+'</div>';
      wrap.appendChild(canvas); div.appendChild(wrap); sm.appendChild(div);
      new Chart(canvas,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:periods.map((_,i)=>i>=periods.length-8?NAVY:GREY),borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'\u00a3'+c.raw.toLocaleString('en-GB')}}},scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{grid:{color:'#f0f2f5'},ticks:{callback:v=>fmtK(v),font:{size:9}},border:{display:false}}}}});
    });
  } catch(e){ document.getElementById('loading').textContent='Failed to load: '+e.message; }
}
load();
</script>
</body>
</html>
