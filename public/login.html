<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procurement P&L — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.12);padding:40px 36px;width:340px}
.logo{text-align:center;margin-bottom:28px}
.logo-text{font-size:22px;font-weight:700;color:#1B365D}
.logo-sub{font-size:13px;color:#666;margin-top:4px}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:6px}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:5px;font-size:14px;margin-bottom:18px;outline:none;transition:border 0.2s}
input:focus{border-color:#1B365D}
button{width:100%;padding:11px;background:#1B365D;color:#fff;border:none;border-radius:5px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s}
button:hover{background:#244a7a}
.error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:10px 12px;border-radius:5px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">Fixmart</div>
    <div class="logo-sub">Procurement P&amp;L</div>
  </div>
  <form method="POST" action="/login">
    <div id="err" class="error" style="display:none">Incorrect username or password</div>
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
  </form>
</div>
<script>if(location.search.includes('error=1')) document.getElementById('err').style.display='block';</script>
</body>
</html>
